    const templateEl = document.querySelector('script[type="__bundler/template"]');

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {

            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();

            writer.close();

            while (true) {
              const { done, value } = await reader.read();

              chunks.push(value);
              totalLen += value.length;

            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }

    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];

    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);

      template = template.slice(0, i) + resourceScript + template.slice(i);

    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);

    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"633d33df-a817-4fe1-9d38-16ff29db634a\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no\">\n<meta name=\"apple-mobile-web-app-capable\" content=\"yes\">\n<meta name=\"apple-mobile-web-app-status-bar-style\" content=\"black-translucent\">\n<meta name=\"theme-color\" content=\"#eef1f6\">\n<style>\n  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }\n  html, body { height: 100%; overflow: hidden; }\n  body { font-family: -apple-system, \"SF Pro Display\", \"SF Pro Text\", Roboto, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }\n  input::placeholder { color: rgba(60,60,67,0.3); }\n  input[type=number]::-webkit-inner-spin-button,\n  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }\n  .scroll { overflow-y: auto; -webkit-overflow-scrolling: touch; }\n  .scroll::-webkit-scrollbar { display: none; }\n  @keyframes iosIn { from { opacity: 0; transform: translateY(16px) scale(0.99); } to { opacity: 1; transform: none; } }\n  @keyframes rowIn { from { opacity: 0; transform: translateX(-14px); } to { opacity: 1; transform: none; } }\n  @keyframes sectionIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: none; } }\n  @keyframes rowOut { from { opacity: 1; transform: none; } to { opacity: 0; transform: translateX(-110%); } }\n  .ios-in { opacity: 0; animation: iosIn 0.55s cubic-bezier(0.22,1,0.36,1) forwards; }\n  .row-in { animation: rowIn 0.42s cubic-bezier(0.22,1,0.36,1) both; }\n  .row-out { animation: rowOut 0.4s cubic-bezier(0.55,0,0.55,0.2) both; }\n  .section-in { animation: sectionIn 0.45s cubic-bezier(0.22,1,0.36,1) both; }\n  .glass-btn { transition: transform 0.12s ease, filter 0.18s ease; }\n  .glass-btn:active { transform: scale(0.97); filter: brightness(0.95); }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"height:100dvh;width:100%;background:radial-gradient(circle at 18% 8%, #d7e9ff 0%, transparent 52%), radial-gradient(circle at 88% 22%, #ffe3ef 0%, transparent 48%), radial-gradient(circle at 50% 100%, #e4f7e9 0%, transparent 55%), #eef1f6;display:flex;justify-content:center;\">\n  <div style=\"width:100%;max-width:480px;height:100%;display:flex;flex-direction:column;\">\n\n    <div style=\"padding:calc(env(safe-area-inset-top) + 16px) 22px 12px;flex:none;\">\n      <div class=\"ios-in\" style=\"animation-delay:0.02s;\">\n        <div style=\"font-size:15px;font-weight:600;color:rgba(60,60,67,0.55);letter-spacing:-0.01em;margin-bottom:1px;\">Взвешивание<\u002Fdiv>\n        <div style=\"font-size:34px;font-weight:800;color:#1c1c1e;letter-spacing:-0.03em;line-height:1;\">Кета<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"scroll\" style=\"flex:1;padding:8px 18px 20px;\">\n\n      <div class=\"ios-in\" style=\"background:rgba(255,255,255,0.55);backdrop-filter:blur(40px) saturate(180%);-webkit-backdrop-filter:blur(40px) saturate(180%);border:1px solid rgba(255,255,255,0.7);border-radius:28px;padding:22px;box-shadow:0 12px 40px rgba(31,45,80,0.12),inset 0 1px 0 rgba(255,255,255,0.6);animation-delay:0.08s;\">\n\n        <div style=\"display:flex;gap:10px;margin-bottom:18px;\">\n          <div style=\"flex:1;background:rgba(255,255,255,0.5);border-radius:16px;padding:12px 14px;\">\n            <div style=\"font-size:12px;color:rgba(60,60,67,0.5);font-weight:600;margin-bottom:3px;\">Закупка<\u002Fdiv>\n            <div style=\"font-size:17px;font-weight:700;color:#1c1c1e;\">1200 <span style=\"font-size:12px;color:rgba(60,60,67,0.5);font-weight:600;\">₽/кг<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex:1;background:rgba(255,255,255,0.5);border-radius:16px;padding:12px 14px;\">\n            <div style=\"font-size:12px;color:rgba(60,60,67,0.5);font-weight:600;margin-bottom:3px;\">Продажа<\u002Fdiv>\n            <div style=\"font-size:17px;font-weight:700;color:#1c1c1e;\">1950 <span style=\"font-size:12px;color:rgba(60,60,67,0.5);font-weight:600;\">₽/кг<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"position:relative;margin-bottom:16px;\">\n          <input type=\"number\" inputmode=\"decimal\" value=\"{{ grams }}\" oninput=\"{{ onInput }}\" placeholder=\"0\" style=\"width:100%;padding:18px 64px 18px 20px;border:none;border-radius:18px;background:rgba(120,120,128,0.12);color:#1c1c1e;font-size:30px;font-weight:700;font-family:inherit;outline:none;\">\n          <span style=\"position:absolute;right:20px;top:50%;transform:translateY(-50%);font-size:16px;color:rgba(60,60,67,0.4);font-weight:600;pointer-events:none;\">грамм<\u002Fspan>\n        <\u002Fdiv>\n\n        <div style=\"background:linear-gradient(160deg,rgba(52,199,89,0.16),rgba(52,199,89,0.08));border:1px solid rgba(52,199,89,0.22);border-radius:20px;padding:18px 20px;margin-bottom:10px;\">\n          <div style=\"font-size:13px;color:#1c8c43;font-weight:700;margin-bottom:5px;letter-spacing:-0.01em;\">Цена продажи<\u002Fdiv>\n          <div style=\"font-size:40px;font-weight:800;color:#1c8c43;letter-spacing:-0.03em;line-height:1;transition:transform 0.18s cubic-bezier(0.22,1,0.36,1);transform:scale({{ sellScale }});transform-origin:left center;\">{{ sellText }}<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;gap:10px;\">\n          <div style=\"flex:1;background:rgba(255,255,255,0.5);border-radius:16px;padding:14px 15px;\">\n            <div style=\"font-size:12px;color:rgba(60,60,67,0.5);font-weight:600;margin-bottom:4px;\">Прибыль<\u002Fdiv>\n            <div style=\"font-size:19px;font-weight:700;color:#1c8c43;\">{{ profitText }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex:1;background:rgba(255,255,255,0.5);border-radius:16px;padding:14px 15px;\">\n            <div style=\"font-size:12px;color:rgba(60,60,67,0.5);font-weight:600;margin-bottom:4px;\">Маржа<\u002Fdiv>\n            <div style=\"font-size:19px;font-weight:700;color:#1c1c1e;\">{{ marginText }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ hasItems }}\" hint-placeholder-val=\"{{ true }}\">\n      <div class=\"section-in\" style=\"margin-top:22px;\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;padding:0 6px;margin-bottom:9px;\">\n          <div style=\"font-size:13px;font-weight:600;color:rgba(60,60,67,0.5);text-transform:uppercase;letter-spacing:0.03em;\">Записано · {{ count }}<\u002Fdiv>\n          <button onclick=\"{{ onClear }}\" style=\"background:none;border:none;color:#ff3b30;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;padding:4px 6px;\">Очистить<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"background:rgba(255,255,255,0.55);backdrop-filter:blur(40px) saturate(180%);-webkit-backdrop-filter:blur(40px) saturate(180%);border:1px solid rgba(255,255,255,0.7);border-radius:22px;overflow:hidden;box-shadow:0 12px 40px rgba(31,45,80,0.1);\">\n          <sc-for list=\"{{ items }}\" as=\"item\" hint-placeholder-count=\"2\">\n            <div class=\"{{ item.rowClass }}\" style=\"display:flex;align-items:center;gap:13px;padding:15px 17px;border-bottom:1px solid rgba(60,60,67,0.08);animation-delay:{{ item.delay }};\">\n              <div style=\"width:27px;height:27px;border-radius:50%;background:rgba(120,120,128,0.14);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:rgba(60,60,67,0.6);flex:none;\">{{ item.num }}<\u002Fdiv>\n              <div style=\"flex:1;font-size:16px;font-weight:600;color:#1c1c1e;\">{{ item.gramsText }}<\u002Fdiv>\n              <div style=\"font-size:16px;font-weight:700;color:#1c8c43;\">{{ item.priceText }}<\u002Fdiv>\n              <button onclick=\"{{ item.onRemove }}\" style=\"width:30px;height:30px;border-radius:50%;background:rgba(120,120,128,0.16);border:none;color:rgba(60,60,67,0.5);font-size:17px;font-family:inherit;cursor:pointer;line-height:1;flex:none;display:flex;align-items:center;justify-content:center;\">×<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n\n    <div style=\"flex:none;padding:14px 18px calc(env(safe-area-inset-bottom) + 16px);background:linear-gradient(0deg, rgba(238,241,246,0.92) 60%, rgba(238,241,246,0));backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);\">\n      <sc-if value=\"{{ hasItems }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:0 4px;\">\n        <div style=\"font-size:14px;color:rgba(60,60,67,0.6);font-weight:600;\">Итого · {{ totalKg }}<\u002Fdiv>\n        <div style=\"font-size:26px;font-weight:800;color:#1c1c1e;letter-spacing:-0.02em;\">{{ totalText }}<\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n      <button class=\"glass-btn\" onclick=\"{{ onRecord }}\" style=\"width:100%;padding:18px;border:none;border-radius:20px;background:#34c759;color:#fff;font-size:18px;font-weight:700;font-family:inherit;cursor:pointer;box-shadow:0 8px 24px rgba(52,199,89,0.35),inset 0 1px 0 rgba(255,255,255,0.3);letter-spacing:-0.01em;\">\n        Записать позицию\n      <\u002Fbutton>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { grams: '', dispG: 0, pulse: 1, items: [], clearing: false, removingIdx: -1 };\n\n  componentDidMount() {\n    try {\n      const saved = JSON.parse(localStorage.getItem('keta_items') || '[]');\n      if (Array.isArray(saved)) this.setState({ items: saved });\n    } catch (e) {}\n  }\n\n  save(items) {\n    this.setState({ items });\n    try { localStorage.setItem('keta_items', JSON.stringify(items)); } catch (e) {}\n  }\n\n  tween(target) {\n    cancelAnimationFrame(this._raf);\n    const start = this.state.dispG;\n    const t0 = performance.now();\n    const dur = 420;\n    const ease = (t) => 1 - Math.pow(1 - t, 3);\n    const step = (now) => {\n      const k = Math.min(1, (now - t0) / dur);\n      this.setState({ dispG: start + (target - start) * ease(k) });\n      if (k < 1) this._raf = requestAnimationFrame(step);\n    };\n    this._raf = requestAnimationFrame(step);\n  }\n\n  onInput = (e) => {\n    const raw = e.target.value;\n    this.setState({ grams: raw, pulse: 1.06 });\n    clearTimeout(this._pt);\n    this._pt = setTimeout(() => this.setState({ pulse: 1 }), 160);\n    this.tween(Number(raw) || 0);\n  };\n\n  onRecord = () => {\n    const g = Number(this.state.grams) || 0;\n    if (g <= 0) return;\n    this.save([...this.state.items, { g }]);\n    this.setState({ grams: '', pulse: 1 });\n    this.tween(0);\n  };\n\n  onClear = () => {\n    if (this.state.clearing || this.state.items.length === 0) return;\n    this.setState({ clearing: true });\n    const n = this.state.items.length;\n    this._ct = setTimeout(() => {\n      this.setState({ clearing: false });\n      this.save([]);\n    }, (n - 1) * 60 + 420);\n  };\n\n  removeAt = (i) => {\n    if (this.state.removingIdx !== -1 || this.state.clearing) return;\n    this.setState({ removingIdx: i });\n    this._rt = setTimeout(() => {\n      this.setState({ removingIdx: -1 });\n      this.save(this.state.items.filter((_, j) => j !== i));\n    }, 400);\n  };\n\n  componentWillUnmount() {\n    cancelAnimationFrame(this._raf);\n    clearTimeout(this._pt);\n    clearTimeout(this._ct);\n    clearTimeout(this._rt);\n  }\n\n  renderVals() {\n    const g = this.state.dispG;\n    const fmt = (n) => Math.round(n).toLocaleString('ru-RU') + ' ₽';\n    const items = this.state.items;\n    const totalG = items.reduce((s, it) => s + it.g, 0);\n    return {\n      grams: this.state.grams,\n      onInput: this.onInput,\n      sellText: fmt(g * 1.95),\n      profitText: fmt(g * 0.75),\n      marginText: Math.round((0.75 / 1.95) * 100) + ' %',\n      sellScale: this.state.pulse,\n      onRecord: this.onRecord,\n      onClear: this.onClear,\n      hasItems: items.length > 0,\n      count: items.length,\n      items: items.map((it, i) => ({\n        num: i + 1,\n        gramsText: it.g.toLocaleString('ru-RU') + ' г',\n        priceText: fmt(it.g * 1.95),\n        rowClass: (this.state.clearing || this.state.removingIdx === i) ? 'row-out' : 'row-in',\n        delay: (this.state.removingIdx === i ? 0 : (this.state.clearing ? i * 0.06 : i * 0.05)).toFixed(2) + 's',\n        onRemove: () => this.removeAt(i),\n      })),\n      totalText: fmt(totalG * 1.95),\n      totalKg: (totalG / 1000).toLocaleString('ru-RU', { maximumFractionDigits: 2 }) + ' кг',\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
